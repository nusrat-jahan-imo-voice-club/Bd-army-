<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD ARMY OFFICIAL - Group Info</title>
    <!-- Google Fonts (Roboto) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* মোবাইল ফ্রেম */
        .mobile-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 480px) {
            .mobile-container {
                max-height: 100vh;
                box-shadow: none;
            }
        }

        /* হেডার বার */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header .back-btn {
            font-size: 22px;
            color: #111b21;
            cursor: pointer;
        }

        .header .right-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .header .right-icons i {
            font-size: 20px;
            color: #111b21;
            cursor: pointer;
        }

        /* প্রোফাইল ও গ্রুপ ইনফো */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 16px 20px 16px;
            background-color: #ffffff;
        }

        .profile-img-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 16px;
            background-color: #e9edef;
            border: 1px solid #e9edef;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .group-title {
            font-size: 22px;
            font-weight: 500;
            color: #111b21;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .group-subtitle {
            font-size: 14px;
            color: #667781;
            margin-bottom: 24px;
            text-align: center;
        }

        .group-subtitle .members-count {
            color: #008069;
            font-weight: 500;
        }

        /* অ্যাকশন বাটনসমূহ */
        .action-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 8px;
            padding: 0 4px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 4px;
            border: 1px solid #e9edef;
            border-radius: 16px;
            background-color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .action-btn:active {
            background-color: #f0f2f5;
        }

        .action-btn i {
            font-size: 20px;
            color: #008069;
            margin-bottom: 8px;
        }

        .action-btn span {
            font-size: 13px;
            color: #111b21;
            font-weight: 400;
        }

        /* সেকশন ডিভাইডার */
        .divider {
            height: 12px;
            background-color: #f0f2f5;
            width: 100%;
            border-top: 1px solid #e9edef;
            border-bottom: 1px solid #e9edef;
        }

        /* লাইভ ফটো ফ্রেম কন্টেইনার */
        .photo-frame-container {
            background-color: #ffffff;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .frame-header {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: #667781;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* লাইভ ইন্ডিকেটর অ্যানিমেশন */
        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ff3b30;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        /* ফটো ফ্রেম উইন্ডো */
        .live-frame {
            width: 100%;
            height: 320px;
            background-color: #f8f9fa;
            border: 2px dashed #008069;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .live-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .placeholder-text {
            position: absolute;
            color: #8696a0;
            font-size: 13px;
            text-align: center;
            padding: 20px;
            line-height: 1.5;
        }

        .placeholder-text i {
            font-size: 32px;
            color: #008069;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <!-- হেডার বার -->
        <div class="header">
            <i class="bi bi-arrow-left back-btn"></i>
            <div class="right-icons">
                <i class="bi bi-grid-3x3-gap"></i>
                <i class="bi bi-three-dots-vertical"></i>
            </div>
        </div>

        <!-- প্রোফাইল সেকশন -->
        <div class="profile-section">
            <div class="profile-img-container">
                <!-- প্রফাইল লোগো src="my-logo.jpg" করা হলো। ছবিটি না পাওয়া গেলে placeholder ছবি লোড হবে -->
                <img src="my-logo.jpg" alt="BD Army Profile" onerror="this.src='https://placehold.co/140x140?text=my-logo.jpg'">
            </div>
            <div class="group-title">BD ARMY OFFICIAL</div>
            <div class="group-subtitle">Group · <span class="members-count">2 members</span></div>

            <!-- অ্যাকশন বাটনসমূহ -->
            <div class="action-buttons">
                <div class="action-btn" onclick="alert('অডিও কল করা হচ্ছে...')">
                    <i class="bi bi-telephone"></i>
                    <span>Audio</span>
                </div>
                <div class="action-btn" onclick="alert('ভিডিও কল করা হচ্ছে...')">
                    <i class="bi bi-camera-video"></i>
                    <span>Video</span>
                </div>
                <div class="action-btn" onclick="alert('নতুন সদস্য যুক্ত করুন')">
                    <i class="bi bi-person-plus"></i>
                    <span>Add</span>
                </div>
                <div class="action-btn" onclick="alert('অনুসন্ধান করুন')">
                    <i class="bi bi-search"></i>
                    <span>Search</span>
                </div>
            </div>
        </div>

        <!-- ডিভাইডার -->
        <div class="divider"></div>

        <!-- লাইভ ফটো ফ্রেম কন্টেইনার (নতুন যুক্ত করা হয়েছে) -->
        <div class="photo-frame-container">
            <div class="frame-header">
                <span class="live-indicator"></span> Live Telegram Bot Stream
            </div>
            <div class="live-frame">
                <!-- লাইভ ছবি আসার জায়গা -->
                <img id="live-frame-img" src="" alt="" style="display: none;">
                <!-- প্রথম অবস্থায় দেখার জন্য প্লেসহোল্ডার মেসেজ -->
                <div id="placeholder-box" class="placeholder-text">
                    <i class="bi bi-telegram"></i>
                    টেলিগ্রাম বটে ছবি আপলোড করুন।<br>ছবিটি এখানে স্বয়ংক্রিয়ভাবে লোড হবে।
                </div>
            </div>
        </div>
    </div>

    <!-- টেলিগ্রাম লাইভ ছবি লোড করার স্ক্রিপ্ট -->
    <script>
        // এখানে আপনার টেলিগ্রাম বট টোকেন (Bot Token) দিন
        const TELEGRAM_BOT_TOKEN = '8899911389:AAFPnyK398tHNQ18z8B8VlkJbR5tv_mwVp0'; 
        
        let lastPhotoUrl = '';

        async function fetchLatestTelegramPhoto() {
            // যদি বট টোকেন পরিবর্তন করা না হয়, তাহলে রিকোয়েস্ট পাঠানো হবে না
            if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === 'YOUR_BOT_TOKEN_HERE') {
                return;
            }

            try {
                // বটের সর্বশেষ ১টি আপডেট (বার্তা) নেওয়ার জন্য রিকোয়েস্ট
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=-1&limit=1`);
                const data = await response.json();
                
                if (data.ok && data.result.length > 0) {
                    const update = data.result[0];
                    const message = update.message || update.channel_post;
                    
                    // মেসেজে যদি ফটো (ছবি) থাকে
                    if (message && message.photo) {
                        const photoArray = message.photo;
                        // সবচেয়ে বড় সাইজের ছবিটির file_id নেওয়া
                        const latestPhoto = photoArray[photoArray.length - 1];
                        const fileId = latestPhoto.file_id;
                        
                        // ফাইল পাথ নেওয়ার জন্য রিকোয়েস্ট
                        const fileResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getFile?file_id=${fileId}`);
                        const fileData = await fileResponse.json();
                        
                        if (fileData.ok) {
                            const filePath = fileData.result.file_path;
                            // ছবির ডিরেক্ট URL তৈরি
                            const photoUrl = `https://api.telegram.org/file/bot${TELEGRAM_BOT_TOKEN}/${filePath}`;
                            
                            // যদি নতুন ছবি পাওয়া যায়, তবেই ফ্রেম আপডেট হবে
                            if (photoUrl !== lastPhotoUrl) {
                                lastPhotoUrl = photoUrl;
                                const imgElement = document.getElementById('live-frame-img');
                                const placeholderElement = document.getElementById('placeholder-box');
                                
                                imgElement.src = photoUrl;
                                imgElement.style.display = 'block';
                                placeholderElement.style.display = 'none';
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("টেলিগ্রাম থেকে ছবি লোড করতে সমস্যা হয়েছে:", error);
            }
        }

        // প্রতি ৫ সেকেন্ড পর পর নতুন আপলোডের জন্য অটোমেটিক চেক করবে (Polling)
        setInterval(fetchLatestTelegramPhoto, 5000);
        
        // পেজ লোড হওয়ামাত্র প্রথম চেক করবে
        fetchLatestTelegramPhoto();
    </script>
</body>
</html>
